region:
  name: keta
  # bbox covers the real Atlantic shoreline (NE-trending, Volta estuary
  # in the SW to Aflao/Togo border in the NE). Matches the eastern-Ghana
  # study area of Asare-Bediako et al. 2025 (Sci Rep 15:33032).
  bbox: [0.85, 5.74, 1.24, 6.15]
  utm_zone: 31N
  # The open Atlantic lies SOUTH of the coast; transects point seaward (S).
  ocean_side: south
  # Onshore baseline (~150 m inland of the OSM Atlantic coastline),
  # following the NE-trending shore. Derived by scripts/derive_keta_baseline.py
  # from data/keta_baseline.json. Transects are cast seaward from it.
  baseline:
    - [0.8663, 5.7807]
    - [0.8724, 5.7813]
    - [0.8780, 5.7820]
    - [0.8838, 5.7825]
    - [0.8896, 5.7828]
    - [0.8958, 5.7833]
    - [0.9017, 5.7841]
    - [0.9084, 5.7850]
    - [0.9137, 5.7857]
    - [0.9201, 5.7870]
    - [0.9252, 5.7883]
    - [0.9317, 5.7917]
    - [0.9381, 5.7960]
    - [0.9438, 5.8001]
    - [0.9495, 5.8058]
    - [0.9555, 5.8115]
    - [0.9611, 5.8171]
    - [0.9674, 5.8240]
    - [0.9727, 5.8304]
    - [0.9791, 5.8406]
    - [0.9847, 5.8523]
    - [0.9922, 5.9120]
    - [0.9952, 5.9273]
    - [1.0030, 5.9424]
    - [1.0089, 5.9514]
    - [1.0139, 5.9602]
    - [1.0211, 5.9716]
    - [1.0265, 5.9784]
