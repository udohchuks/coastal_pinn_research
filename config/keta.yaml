  # DSAS-style spacing/length (paper uses 50 m / 500 m; 750 m gives margin
  # for shoreline excursion past the onshore baseline).
  transect_spacing_m: 50
  transect_length_m: 750

time:
  start: 2018-01-01
  end:   2024-12-31

cache:
  root: coastal_research_ashesi
  strategy: append_only

reconcile:
  join_tolerance: 36h

sources:
  bathymetry:
    enabled: true
    product: gebco_2026
  sea_level:
    enabled: true
    product: copernicus_phy_anfc
  wave_intensity:
    enabled: true
    product: copernicus_wam
  shoreline:
    enabled: true
    gee_project: igem2026
    sitename: Keta
    save_qc: false
    # Drop S2 scenes cloudier than this (scene-level %) BEFORE download.
    # Lower = faster (fewer downloads) but may skip scenes clear over Keta.
    cloud_cover_max: 85
    # Tiles downloaded + extracted in parallel (each cleaned up after).
    download_workers: 1
